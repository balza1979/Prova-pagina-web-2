<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Documenti PDF</title>

<style>
body {
  font-family: Arial;
  background: #eef1f5;
  padding: 40px;
}
h1 {
  text-align: center;
}
.card {
  background: white;
  padding: 20px;
  margin: 15px auto;
  max-width: 500px;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.card button {
  background: #007bff;
  color: white;
  border: none;
  padding: 10px 18px;
  border-radius: 6px;
  cursor: pointer;
  transition: 0.2s;
}
.card button:hover {
  background: #0056b3;
}
</style>
</head>

<body>

<h1>Documenti PDF</h1>
<div id="pdf-container"></div>

<script>
// CONFIGURAZIONE
const owner = "balza1979";
const repo = "Prova-pagina-web-2";
const folder = "pdf";

// API GitHub per leggere la cartella /pdf/
const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${folder}`;

fetch(apiUrl)
  .then(response => response.json())
  .then(files => {
    const pdfs = files.filter(f => f.name.toLowerCase().endsWith(".pdf"));
    const container = document.getElementById("pdf-container");

    pdfs.forEach(pdf => {
      const encodedName = encodeURIComponent(pdf.name);

      // URL ASSOLUTO → FUNZIONA SU IPHONE
      const pdfUrl = `https://${owner}.github.io/${repo}/${folder}/${encodedName}`;

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <span>📄 ${pdf.name}</span>
        <button onclick="window.open('${pdfUrl}', '_blank')">Apri</button>
      `;

      container.appendChild(card);
    });
  })
  .catch(err => {
    console.error("Errore nel caricamento dei PDF:", err);
  });
</script>

</body>
</html>
